# SecureLink debug config -- quick smoke test (2 epochs, small batch)

[data]
data_root = "repositories/SecureLink_data"
sample_length = 6
csi_subcarriers = 52
mems_fields = ["pitch", "roll", "yaw", "tof", "baro", "agx", "agy", "agz"]
phase_variance_threshold = 4.0
num_uavs = 22
num_registered = 20
train_ratio = 0.6
val_ratio = 0.2
test_ratio = 0.2
num_workers = 0
pin_memory = false

[model]
cnn_filters = 32
cnn_kernel_sizes = [3, 2]
lstm_hidden = 32
lstm_layers = 1
attention_heads = 2
attention_layers = 1
embedding_dim = 64
ff_dim = 128
dropout = 0.1

[loss]
alpha = 1.0
beta = 10.0
margin = 0.5
epsilon = 0.1

[training]
batch_size = 32
learning_rate = 0.001
epochs = 2
optimizer = "adam"
weight_decay = 0.0
scheduler = "cosine"
warmup_ratio = 0.05
min_lr = 1e-6
precision = "fp32"
gradient_accumulation = 1
max_grad_norm = 1.0
seed = 42

[checkpoint]
output_dir = "/mnt/artifacts-datai/checkpoints/securelink_debug"
save_every_n_steps = 50
keep_top_k = 1
metric = "val_loss"
mode = "min"

[early_stopping]
enabled = false
patience = 5
min_delta = 1e-4

[logging]
log_dir = "/mnt/artifacts-datai/logs/securelink_debug"
tensorboard_dir = "/mnt/artifacts-datai/tensorboard/securelink_debug"

[ocsvm]
kernel = "rbf"
nu = 0.1
gamma = "scale"
